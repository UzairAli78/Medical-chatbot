<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediChat — AI Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0d1b2a;--teal:#0ea5a0;--teal2:#14b8b3;--text:#1e2d3d;--muted:#6b7c8d;--border:#dce6ed;--gray:#f4f7f9}
    html,body{height:100%;font-family:'Inter',sans-serif}
    body{display:flex;flex-direction:column;background:linear-gradient(135deg,#0d1b2a 0%,#1b2b3a 100%)}
    header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:62px;background:rgba(13,27,42,0.95);border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
    .header-left{display:flex;align-items:center;gap:12px}
    .bot-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--teal),#0d9488);display:flex;align-items:center;justify-content:center;font-size:17px;color:white;position:relative;flex-shrink:0}
    .bot-online{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:#22c55e;border:2px solid #0d1b2a}
    .bot-info .name{font-size:15px;font-weight:600;color:white}
    .bot-info .status{font-size:12px;color:rgba(255,255,255,0.5)}
    .header-right{display:flex;gap:8px}
    .header-btn{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.06);border:none;color:rgba(255,255,255,0.6);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;text-decoration:none}
    .header-btn:hover{background:rgba(255,255,255,0.12);color:white}
    .chat-area{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px;max-width:820px;width:100%;margin:0 auto;align-self:stretch}
    .chat-area::-webkit-scrollbar{width:4px}
    .chat-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px}
    .msg-row{display:flex;gap:10px;align-items:flex-end}
    .msg-row.user{flex-direction:row-reverse}
    .msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
    .msg-avatar.bot{background:linear-gradient(135deg,var(--teal),#0d9488);color:white}
    .msg-avatar.user-av{background:linear-gradient(135deg,#6366f1,#4f46e5);color:white}
    .bubble{max-width:72%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.65;position:relative}
    .bubble.bot{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.9);border-bottom-left-radius:4px;border:1px solid rgba(255,255,255,0.08)}
    .bubble.user{background:linear-gradient(135deg,var(--teal),#0d9488);color:white;border-bottom-right-radius:4px}
    .bubble p{margin-bottom:8px}
    .bubble p:last-child{margin-bottom:0}
    .bubble ul,.bubble ol{padding-left:18px;margin:6px 0}
    .bubble li{margin-bottom:4px}
    .bubble strong{font-weight:600}
    .msg-time{font-size:10px;opacity:.5;margin-top:5px;display:block}
    .welcome-card{text-align:center;padding:32px 24px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;margin:auto;max-width:420px;width:100%}
    .welcome-icon{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--teal),#0d9488);display:flex;align-items:center;justify-content:center;font-size:28px;color:white;margin:0 auto 16px}
    .welcome-card h2{font-size:20px;font-weight:700;color:white;margin-bottom:8px}
    .welcome-card p{font-size:14px;color:rgba(255,255,255,0.55);line-height:1.6;margin-bottom:20px}
    .quick-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
    .quick-btn{padding:7px 14px;background:rgba(14,165,160,0.15);border:1px solid rgba(14,165,160,0.3);border-radius:50px;color:var(--teal2);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
    .quick-btn:hover{background:rgba(14,165,160,0.25);border-color:var(--teal2)}
    .typing{display:none;align-items:center;gap:10px}
    .typing.show{display:flex}
    .typing-dots{display:flex;gap:4px;padding:12px 16px;background:rgba(255,255,255,0.08);border-radius:18px;border-bottom-left-radius:4px;border:1px solid rgba(255,255,255,0.08)}
    .typing-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);animation:bounce .9s infinite}
    .typing-dots span:nth-child(2){animation-delay:.15s}
    .typing-dots span:nth-child(3){animation-delay:.3s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
    .input-bar{padding:14px 20px;background:rgba(13,27,42,0.95);border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0}
    .input-inner{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
    .input-wrap{flex:1;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:14px;padding:10px 16px;display:flex;align-items:center;gap:10px;transition:border-color .2s}
    .input-wrap:focus-within{border-color:var(--teal);background:rgba(255,255,255,0.08)}
    #msgInput{flex:1;background:none;border:none;outline:none;color:white;font-size:14px;font-family:'Inter',sans-serif;resize:none;max-height:120px;line-height:1.5}
    #msgInput::placeholder{color:rgba(255,255,255,0.35)}
    .send-btn{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--teal),#0d9488);border:none;color:white;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
    .send-btn:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(14,165,160,0.4)}
    .send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    @media(max-width:600px){.chat-area{padding:16px 12px}.input-bar{padding:10px 12px}}
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="bot-avatar">
      <i class="fa-solid fa-stethoscope"></i>
      <div class="bot-online"></div>
    </div>
    <div class="bot-info">
      <div class="name">MediChat AI</div>
      <div class="status">Online — Medical Assistant</div>
    </div>
  </div>
  <div class="header-right">
    <a href="{{ url_for('agnos') }}" class="header-btn" title="Home"><i class="fa-solid fa-house"></i></a>
    <button class="header-btn" onclick="clearChat()" title="Clear chat"><i class="fa-solid fa-rotate-left"></i></button>
  </div>
</header>

<div class="chat-area" id="chatArea">
  <div class="welcome-card" id="welcomeCard">
    <div class="welcome-icon"><i class="fa-solid fa-heart-pulse"></i></div>
    <h2>Hello! I'm MediChat</h2>
    <p>I'm an AI medical assistant powered by Google Gemini. Ask me anything about health, symptoms, medications, or medical conditions.</p>
    <div class="quick-btns">
      <button class="quick-btn" onclick="sendQuick('What are common symptoms of diabetes?')">Diabetes symptoms</button>
      <button class="quick-btn" onclick="sendQuick('How do I lower my blood pressure naturally?')">Blood pressure</button>
      <button class="quick-btn" onclick="sendQuick('What causes frequent headaches?')">Headaches</button>
      <button class="quick-btn" onclick="sendQuick('What are signs of vitamin D deficiency?')">Vitamin D</button>
    </div>
  </div>
  <div class="typing msg-row" id="typingIndicator">
    <div class="msg-avatar bot"><i class="fa-solid fa-stethoscope"></i></div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="input-bar">
  <div class="input-inner">
    <div class="input-wrap">
      <textarea id="msgInput" placeholder="Ask a medical question..." rows="1"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
  </div>
</div>

<script>
  const chatArea = document.getElementById('chatArea');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const typingIndicator = document.getElementById('typingIndicator');
  const welcomeCard = document.getElementById('welcomeCard');

  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  msgInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  function getTime() {
    const d = new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function appendMsg(text, isUser) {
    const row = document.createElement('div');
    row.className = 'msg-row' + (isUser ? ' user' : '');
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar ' + (isUser ? 'user-av' : 'bot');
    avatar.innerHTML = isUser ? '<i class="fa-solid fa-user"></i>' : '<i class="fa-solid fa-stethoscope"></i>';
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + (isUser ? 'user' : 'bot');
    bubble.innerHTML = (isUser ? text : text) + '<span class="msg-time">' + getTime() + '</span>';
    row.appendChild(avatar);
    row.appendChild(bubble);
    chatArea.insertBefore(row, typingIndicator);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;
    if (welcomeCard) welcomeCard.style.display = 'none';
    appendMsg(text, true);
    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = true;
    typingIndicator.classList.add('show');
    chatArea.scrollTop = chatArea.scrollHeight;
    $.ajax({ data: { msg: text }, type: 'POST', url: '/get' })
      .done(data => { typingIndicator.classList.remove('show'); appendMsg(data, false); })
      .fail(() => { typingIndicator.classList.remove('show'); appendMsg('<i>Sorry, something went wrong. Please try again.</i>', false); })
      .always(() => { sendBtn.disabled = false; });
  }

  function sendQuick(text) {
    msgInput.value = text;
    sendMessage();
  }

  function clearChat() {
    const msgs = chatArea.querySelectorAll('.msg-row:not(#typingIndicator)');
    msgs.forEach(m => m.remove());
    if (welcomeCard) welcomeCard.style.display = 'block';
  }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</body>
</html>
