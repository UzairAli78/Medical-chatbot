<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — MediChat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0d1b2a;--teal:#0ea5a0;--teal2:#14b8b3;--white:#fff;--gray:#f4f7f9;--text:#1e2d3d;--muted:#6b7c8d;--border:#dce6ed}
    body{font-family:'Inter',sans-serif;min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
    .left-panel{background:linear-gradient(135deg,var(--navy) 0%,#0f2940 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:60px 40px;position:relative;overflow:hidden}
    .left-panel::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(14,165,160,0.2) 0%,transparent 70%)}
    .left-panel::after{content:'';position:absolute;bottom:-100px;left:-100px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(14,165,160,0.1) 0%,transparent 70%)}
    .left-content{position:relative;z-index:1;text-align:center;max-width:380px}
    .left-logo{display:inline-flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:48px}
    .left-logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--teal),#0d9488);display:flex;align-items:center;justify-content:center;font-size:20px;color:white}
    .left-logo-text{font-size:24px;font-weight:700;color:white}
    .left-logo-text span{color:var(--teal2)}
    .left-img{width:260px;height:260px;border-radius:24px;object-fit:cover;border:2px solid rgba(14,165,160,0.3);box-shadow:0 20px 60px rgba(0,0,0,0.4);margin-bottom:32px}
    .left-tagline{font-size:18px;font-weight:600;color:white;line-height:1.4;margin-bottom:12px}
    .left-sub{font-size:14px;color:rgba(255,255,255,0.55);line-height:1.6}
    .trust-badges{display:flex;gap:16px;margin-top:28px;justify-content:center;flex-wrap:wrap}
    .badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:50px;padding:6px 14px;color:rgba(255,255,255,0.7);font-size:12px;font-weight:500}
    .badge i{color:var(--teal2);font-size:13px}
    .right-panel{background:var(--white);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:60px 40px}
    .form-box{width:100%;max-width:400px}
    .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;margin-bottom:36px;transition:color .2s}
    .back-link:hover{color:var(--teal)}
    .form-title{font-size:28px;font-weight:700;color:var(--text);margin-bottom:6px}
    .form-sub{font-size:14px;color:var(--muted);margin-bottom:32px}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px}
    .input-wrap{position:relative}
    .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}
    .input-wrap input{width:100%;padding:12px 14px 12px 40px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;background:var(--gray)}
    .input-wrap input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,165,160,0.1);background:white}
    .form-footer{display:flex;justify-content:flex-end;margin-bottom:20px}
    .form-footer a{font-size:13px;color:var(--teal);text-decoration:none;font-weight:500}
    .form-footer a:hover{text-decoration:underline}
    .btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--teal),#0d9488);color:white;font-size:15px;font-weight:600;border:none;border-radius:10px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .25s;box-shadow:0 4px 15px rgba(14,165,160,0.3)}
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(14,165,160,0.4)}
    .divider{display:flex;align-items:center;gap:14px;margin:24px 0;color:var(--muted);font-size:13px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .signup-prompt{text-align:center;font-size:14px;color:var(--muted)}
    .signup-prompt a{color:var(--teal);font-weight:600;text-decoration:none}
    .signup-prompt a:hover{text-decoration:underline}
    @media(max-width:768px){body{grid-template-columns:1fr}.left-panel{display:none}.right-panel{padding:40px 24px}}
  </style>
</head>
<body>
<div class="left-panel">
  <div class="left-content">
    <a href="{{ url_for('agnos') }}" class="left-logo">
      <div class="left-logo-icon"><i class="fa-solid fa-heart-pulse"></i></div>
      <span class="left-logo-text">Medi<span>Chat</span></span>
    </a>
    <img src="{{ url_for('static', filename='images/Gemini_Generated_Image_x3lgz7x3lgz7x3lg.jpg') }}" alt="Medical AI" class="left-img">
    <div class="left-tagline">Your AI-powered medical companion</div>
    <div class="left-sub">Get instant answers to health questions backed by professional medical literature.</div>
    <div class="trust-badges">
      <div class="badge"><i class="fa-solid fa-shield-halved"></i> Secure</div>
      <div class="badge"><i class="fa-solid fa-clock"></i> 24/7</div>
      <div class="badge"><i class="fa-solid fa-book-medical"></i> Verified</div>
    </div>
  </div>
</div>

<div class="right-panel">
  <div class="form-box">
    <a href="{{ url_for('agnos') }}" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    <div class="form-title">Welcome back</div>
    <div class="form-sub">Log in to your MediChat account</div>
    <form>
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
      </div>
      <div class="form-footer">
        <a href="#">Forgot password?</a>
      </div>
      <button type="submit" class="btn-submit">Log In</button>
    </form>
    <div class="divider">or</div>
    <div class="signup-prompt">Don't have an account? <a href="{{ url_for('signup') }}">Sign up for free</a></div>
  </div>
</div>
</body>
</html>
